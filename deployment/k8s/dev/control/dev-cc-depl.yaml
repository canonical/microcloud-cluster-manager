apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-depl
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: control
  template:
    metadata:
      labels:
        app: control
    spec:
      containers:
      - name: control
        resources:
          limits:
            cpu: "2000m" # Up to 2 full cores
          requests:
            cpu: "1000m" # Use 1 full cores
        image: control-img
        ports:
        - name: debug
          containerPort: 40001