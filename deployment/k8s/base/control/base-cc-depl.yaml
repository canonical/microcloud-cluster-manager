apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-depl
spec:
  selector:
    matchLabels:
      app: control
  template:
    metadata:
      labels:
        app: control
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      terminationGracePeriodSeconds: 60
      containers:
      - name: control
        image: control-img
        ports:
        - name: control
          containerPort: 9001
        # TODO: more ports for readiness and liveness probes
        envFrom:
        - configMapRef:
            name: config
        # mount a volume inside the container, at the path specified
        # this volume will contain the certificate generated by cert-manager for the control service
        volumeMounts:
        - name: cert-volume
          mountPath: "/etc/ssl/certs"
          readOnly: true
      volumes:
      - name: cert-volume
        # the certificate is stored in a cluster secret, which will be mounted as a volume in the container
        # the actual .crt and .key file paths are specified in the configmap so that pods may access them by using the environment vars
        secret:
          secretName: control-cert-secret