global
  daemon

defaults
  mode  http
  timeout connect 500000
  timeout client  500000
  timeout server  500000

frontend anbox_proxy
  # Need this since auth0 callback url requires https
  bind BIND_ADDRESS ssl crt keys/lxd-ui.pem
  acl is_api path_beg /1.0
  use_backend go_backend if is_api
  default_backend ui_serve

backend ui_serve
  server ui_server 127.0.0.1:3000

backend go_backend
  http-request replace-header Host .* 127.0.0.1:9001
  server go_server 127.0.0.1:9001 ssl verify none
